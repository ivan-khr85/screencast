<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screen Stream</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background: #0a0a0a;
    color: #e0e0e0;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    overflow: hidden;
  }

  #auth-screen {
    text-align: center;
    max-width: 320px;
  }
  #auth-screen h1 {
    font-size: 1.3rem;
    margin-bottom: 1.2rem;
    font-weight: 500;
  }
  #auth-screen input {
    width: 100%;
    padding: 10px 14px;
    font-size: 1rem;
    border: 1px solid #333;
    border-radius: 6px;
    background: #1a1a1a;
    color: #e0e0e0;
    outline: none;
    text-align: center;
    letter-spacing: 2px;
    font-family: monospace;
  }
  #auth-screen input:focus { border-color: #4a9eff; }
  #auth-screen button {
    margin-top: 12px;
    width: 100%;
    padding: 10px;
    font-size: 1rem;
    border: none;
    border-radius: 6px;
    background: #4a9eff;
    color: #fff;
    cursor: pointer;
    font-weight: 500;
  }
  #auth-screen button:hover { background: #3a8eef; }
  #auth-error {
    color: #ff5555;
    margin-top: 10px;
    font-size: 0.9rem;
    display: none;
  }

  #player-screen { display: none; width: 100%; height: 100%; }
  video {
    width: 100%;
    height: 100%;
    object-fit: contain;
    background: #000;
  }

  #status {
    position: fixed;
    top: 12px;
    right: 14px;
    font-size: 0.8rem;
    padding: 4px 10px;
    border-radius: 4px;
    background: rgba(0,0,0,0.7);
    display: none;
    z-index: 10;
  }
  #status.connected { color: #4ade80; }
  #status.reconnecting { color: #fbbf24; }
  #status.error { color: #ff5555; }

  #stream-stats {
    position: fixed;
    bottom: 10px;
    left: 12px;
    font-size: 0.72rem;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    background: rgba(0,0,0,0.65);
    color: #aaa;
    padding: 5px 10px;
    border-radius: 4px;
    display: none;
    z-index: 10;
    line-height: 1.5;
    pointer-events: none;
  }
  #stream-stats span { color: #ccc; }

  #error-toasts {
    position: fixed;
    bottom: 10px;
    right: 12px;
    z-index: 20;
    display: flex;
    flex-direction: column-reverse;
    gap: 6px;
    max-width: 340px;
  }
  .error-toast {
    font-size: 0.78rem;
    font-family: 'SF Mono', 'Menlo', 'Consolas', monospace;
    padding: 6px 10px;
    border-radius: 4px;
    background: rgba(80,10,10,0.85);
    color: #ff8888;
    border-left: 3px solid #ff5555;
    animation: toast-in 0.2s ease-out;
  }
  .error-toast.warn {
    background: rgba(60,40,0,0.85);
    color: #fbbf24;
    border-left-color: #f59e0b;
  }
  @keyframes toast-in {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* Chat */
  #chat-toggle {
    position: fixed;
    bottom: 12px;
    right: 14px;
    z-index: 30;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: none;
    background: rgba(74,158,255,0.85);
    color: #fff;
    font-size: 18px;
    cursor: pointer;
    display: none;
    align-items: center;
    justify-content: center;
    box-shadow: 0 2px 8px rgba(0,0,0,0.4);
    transition: background 0.15s;
    line-height: 1;
  }
  #chat-toggle:hover { background: rgba(58,142,239,0.95); }
  #chat-toggle .badge {
    position: absolute;
    top: -2px;
    right: -2px;
    background: #ef4444;
    color: #fff;
    font-size: 10px;
    font-weight: 700;
    min-width: 16px;
    height: 16px;
    border-radius: 8px;
    display: none;
    align-items: center;
    justify-content: center;
    padding: 0 4px;
  }

  #chat-panel {
    position: fixed;
    bottom: 58px;
    right: 14px;
    width: 300px;
    height: 360px;
    min-width: 240px;
    min-height: 200px;
    background: rgba(15,15,15,0.92);
    border: 1px solid #333;
    border-radius: 10px;
    display: none;
    flex-direction: column;
    z-index: 30;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    resize: both;
    overflow: hidden;
  }
  #chat-panel.open { display: flex; }

  #chat-resize-handle {
    height: 18px;
    cursor: grab;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
    user-select: none;
  }
  #chat-resize-handle:active { cursor: grabbing; }
  #chat-resize-handle::after {
    content: '';
    width: 32px;
    height: 4px;
    border-radius: 2px;
    background: #444;
  }

  #chat-messages {
    flex: 1;
    overflow-y: auto;
    padding: 10px 12px;
    min-height: 0;
    font-size: 0.82rem;
    line-height: 1.45;
  }
  #chat-messages::-webkit-scrollbar { width: 4px; }
  #chat-messages::-webkit-scrollbar-thumb { background: #444; border-radius: 2px; }

  .chat-msg {
    margin-bottom: 6px;
    animation: toast-in 0.15s ease-out;
  }
  .chat-msg .chat-sender {
    font-weight: 600;
    color: #4a9eff;
    margin-right: 6px;
    font-size: 0.78rem;
  }
  .chat-msg .chat-text {
    color: #ddd;
    word-break: break-word;
  }

  #chat-name-row {
    display: flex;
    padding: 8px 8px 4px;
  }
  #chat-name-input {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 0.85rem;
    outline: none;
    font-family: inherit;
  }
  #chat-name-input:focus { border-color: #4a9eff; }
  #chat-name-btn {
    margin-left: 6px;
    padding: 6px 14px;
    border: none;
    border-radius: 6px;
    background: #22c55e;
    color: #fff;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
  }
  #chat-name-btn:hover { background: #16a34a; }
  #chat-name-error {
    color: #ff5555;
    font-size: 0.75rem;
    padding: 2px 12px 4px;
    display: none;
  }

  #chat-input-row {
    display: flex;
    border-top: 1px solid #2a2a2a;
    padding: 6px 8px;
  }
  #chat-input {
    flex: 1;
    padding: 7px 10px;
    border: 1px solid #333;
    border-radius: 6px;
    background: #1a1a1a;
    color: #e0e0e0;
    font-size: 0.85rem;
    outline: none;
    font-family: inherit;
  }
  #chat-input:focus { border-color: #4a9eff; }
  #chat-send {
    margin-left: 6px;
    padding: 6px 12px;
    border: none;
    border-radius: 6px;
    background: #4a9eff;
    color: #fff;
    font-size: 0.82rem;
    font-weight: 600;
    cursor: pointer;
  }
  #chat-send:hover { background: #3a8eef; }
</style>
</head>
<body>

<div id="auth-screen">
  <h1>Screen Stream</h1>
  <form id="auth-form">
    <input type="text" id="password-input" placeholder="Enter password" autocomplete="off" autofocus>
    <button type="submit">Connect</button>
    <div id="auth-error"></div>
  </form>
</div>

<div id="player-screen">
  <video id="video" autoplay muted playsinline></video>
</div>

<div id="status"></div>
<div id="stream-stats"></div>
<div id="error-toasts"></div>

<button id="chat-toggle" onclick="toggleChat()">
  <span>&#128172;</span>
  <span class="badge" id="chat-badge"></span>
</button>
<div id="chat-panel">
  <div id="chat-resize-handle"></div>
  <div id="chat-name-row">
    <input type="text" id="chat-name-input" placeholder="Enter your name..." maxlength="30" autocomplete="off">
    <button id="chat-name-btn" onclick="setName()">Join</button>
  </div>
  <div id="chat-name-error"></div>
  <div id="chat-messages"></div>
  <div id="chat-input-row" style="display:none;">
    <input type="text" id="chat-input" placeholder="Send a message..." maxlength="500" autocomplete="off">
    <button id="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<script>
(function() {
  let BUFFER_EVICTION_SEC = 5;
  let LIVE_EDGE_THRESHOLD = 1;
  const RECONNECT_DELAYS = [1000, 2000, 4000, 8000];

  const authScreen = document.getElementById('auth-screen');
  const playerScreen = document.getElementById('player-screen');
  const video = document.getElementById('video');
  const statusEl = document.getElementById('status');
  const authForm = document.getElementById('auth-form');
  const passwordInput = document.getElementById('password-input');
  const authError = document.getElementById('auth-error');
  const statsEl = document.getElementById('stream-stats');
  const toastsEl = document.getElementById('error-toasts');

  let ws = null;
  let mediaSource = null;
  let sourceBuffer = null;
  let queue = [];
  let reconnectAttempt = 0;
  let password = '';
  let initSegment = null;
  let authenticated = false;
  let serverMime = null;
  let streamInfo = { fps: null, bitrate: null, viewers: null };

  // Chat
  const chatToggle = document.getElementById('chat-toggle');
  const chatPanel = document.getElementById('chat-panel');
  const chatMessages = document.getElementById('chat-messages');
  const chatInput = document.getElementById('chat-input');
  const chatInputRow = document.getElementById('chat-input-row');
  const chatBadge = document.getElementById('chat-badge');
  const chatNameRow = document.getElementById('chat-name-row');
  const chatNameInput = document.getElementById('chat-name-input');
  const chatNameError = document.getElementById('chat-name-error');
  let chatOpen = false;
  let unreadCount = 0;
  let chatEnabled = false;
  let myName = null;

  window.toggleChat = function() {
    chatOpen = !chatOpen;
    chatPanel.classList.toggle('open', chatOpen);
    if (chatOpen) {
      unreadCount = 0;
      chatBadge.style.display = 'none';
      if (myName) chatInput.focus();
      else chatNameInput.focus();
    }
  };

  window.setName = function() {
    const name = chatNameInput.value.trim();
    if (!name || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'set_name', name: name }));
  };

  chatNameInput?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); window.setName(); }
  });

  function handleNameResult(msg) {
    if (msg.success) {
      myName = msg.name;
      chatNameRow.style.display = 'none';
      chatNameError.style.display = 'none';
      chatInputRow.style.display = 'flex';
      chatInput.focus();
    } else {
      chatNameError.textContent = msg.error || 'Name not available';
      chatNameError.style.display = 'block';
      chatNameInput.focus();
      chatNameInput.select();
    }
  }

  function handleChatEnabled(enabled) {
    chatEnabled = enabled;
    if (enabled) {
      chatToggle.style.display = 'flex';
    } else {
      chatToggle.style.display = 'none';
      chatPanel.classList.remove('open');
      chatOpen = false;
    }
  }

  window.sendChat = function() {
    const text = chatInput.value.trim();
    if (!text || !myName || !ws || ws.readyState !== WebSocket.OPEN) return;
    ws.send(JSON.stringify({ type: 'chat', message: text }));
    chatInput.value = '';
    chatInput.focus();
  };

  chatInput?.addEventListener('keydown', (e) => {
    if (e.key === 'Enter') { e.preventDefault(); window.sendChat(); }
  });

  // Drag handle to resize chat panel height/width
  const chatResizeHandle = document.getElementById('chat-resize-handle');
  let resizing = false;
  let resizeStartY = 0;
  let resizeStartX = 0;
  let resizeStartH = 0;
  let resizeStartW = 0;

  chatResizeHandle?.addEventListener('mousedown', (e) => {
    e.preventDefault();
    resizing = true;
    resizeStartY = e.clientY;
    resizeStartX = e.clientX;
    resizeStartH = chatPanel.offsetHeight;
    resizeStartW = chatPanel.offsetWidth;
    document.body.style.userSelect = 'none';
  });

  document.addEventListener('mousemove', (e) => {
    if (!resizing) return;
    const dy = resizeStartY - e.clientY;
    const dx = resizeStartX - e.clientX;
    const newH = Math.max(200, Math.min(window.innerHeight - 80, resizeStartH + dy));
    const newW = Math.max(240, Math.min(window.innerWidth - 30, resizeStartW + dx));
    chatPanel.style.height = newH + 'px';
    chatPanel.style.width = newW + 'px';
  });

  document.addEventListener('mouseup', () => {
    if (resizing) {
      resizing = false;
      document.body.style.userSelect = '';
    }
  });

  function addChatMessage(sender, text) {
    const el = document.createElement('div');
    el.className = 'chat-msg';
    const s = document.createElement('span');
    s.className = 'chat-sender';
    s.textContent = sender;
    const t = document.createElement('span');
    t.className = 'chat-text';
    t.textContent = text;
    el.appendChild(s);
    el.appendChild(t);
    chatMessages.appendChild(el);
    // Keep max 100 messages
    while (chatMessages.children.length > 100) chatMessages.removeChild(chatMessages.firstChild);
    chatMessages.scrollTop = chatMessages.scrollHeight;

    if (!chatOpen) {
      unreadCount++;
      chatBadge.textContent = unreadCount > 9 ? '9+' : unreadCount;
      chatBadge.style.display = 'flex';
    }
  }

  function setStatus(text, cls) {
    statusEl.textContent = text;
    statusEl.className = cls;
    statusEl.style.display = text ? 'block' : 'none';
  }

  function showError(msg, warn) {
    const el = document.createElement('div');
    el.className = 'error-toast' + (warn ? ' warn' : '');
    el.textContent = msg;
    toastsEl.appendChild(el);
    // Keep max 5 toasts
    while (toastsEl.children.length > 5) toastsEl.removeChild(toastsEl.firstChild);
    setTimeout(() => { if (el.parentNode) el.remove(); }, 6000);
  }

  function updateStats() {
    if (!authenticated || playerScreen.style.display === 'none') {
      statsEl.style.display = 'none';
      return;
    }

    const parts = [];

    // Resolution
    if (video.videoWidth && video.videoHeight) {
      parts.push(`<span>${video.videoWidth}x${video.videoHeight}</span>`);
    }

    // FPS
    if (streamInfo.fps) {
      parts.push(`<span>${streamInfo.fps}</span> fps`);
    }

    // Bitrate
    if (streamInfo.bitrate) {
      parts.push(`<span>${streamInfo.bitrate}bps</span>`);
    }

    // Viewers
    if (streamInfo.viewers != null) {
      parts.push(`<span>${streamInfo.viewers}</span> viewer${streamInfo.viewers !== 1 ? 's' : ''}`);
    }

    // Delay
    if (sourceBuffer) {
      try {
        const buffered = sourceBuffer.buffered;
        if (buffered.length > 0) {
          const delay = buffered.end(buffered.length - 1) - video.currentTime;
          parts.push(`delay <span>${delay.toFixed(1)}s</span>`);
        }
      } catch {}
    }

    // Queue
    if (queue.length > 0) {
      parts.push(`queue <span>${queue.length}</span>`);
    }

    if (parts.length > 0) {
      statsEl.innerHTML = parts.join(' &middot; ');
      statsEl.style.display = 'block';
    }
  }

  setInterval(updateStats, 500);

  function dbg() {}

  function getWsUrl() {
    const proto = location.protocol === 'https:' ? 'wss:' : 'ws:';
    return `${proto}//${location.host}`;
  }

  // Auto-connect if password is in the URL hash (#password).
  // Hash fragments are never sent to the server or proxy (Cloudflare),
  // so they survive tunneling and aren't logged.
  const hashPassword = location.hash.slice(1);
  if (hashPassword) {
    password = decodeURIComponent(hashPassword);
    history.replaceState(null, '', location.pathname);
    connect();
  }

  authForm.addEventListener('submit', (e) => {
    e.preventDefault();
    password = passwordInput.value.trim();
    if (!password) return;
    authError.style.display = 'none';
    connect();
  });

  function connect() {
    if (ws) {
      ws.onclose = null;
      ws.close();
    }

    setStatus('Connecting...', 'reconnecting');
    ws = new WebSocket(getWsUrl());
    ws.binaryType = 'arraybuffer';
    authenticated = false;
    myName = null;
    chatNameRow.style.display = 'flex';
    chatInputRow.style.display = 'none';
    chatNameError.style.display = 'none';

    ws.onopen = () => {
      dbg('WebSocket connected, sending auth');
      ws.send(JSON.stringify({ type: 'auth', password: password }));
    };

    ws.onmessage = (event) => {
      if (!authenticated) {
        handleAuthResponse(event.data);
        return;
      }
      handleSegment(event.data);
    };

    ws.onclose = (e) => {
      dbg('WebSocket closed, code=' + e.code, 'reason=' + e.reason);
      if (e.code === 4003) {
        showAuthError('Wrong password');
        return;
      }
      if (e.code === 4005) {
        showAuthError('Stream is full');
        return;
      }
      if (e.code === 4006) {
        showError('Disconnected: client too slow (backpressure)');
      } else if (e.code === 4010) {
        showError('Stream is restarting...', true);
      } else if (authenticated && e.code !== 1000) {
        showError('Connection lost (code ' + e.code + ')');
      }
      if (authenticated) {
        setStatus('Reconnecting...', 'reconnecting');
        scheduleReconnect();
      }
    };

    ws.onerror = () => {
      if (authenticated) showError('WebSocket error');
    };
  }

  function handleAuthResponse(data) {
    try {
      const msg = JSON.parse(data);
      if (msg.type === 'auth' && msg.success) {
        authenticated = true;
        reconnectAttempt = 0;
        authScreen.style.display = 'none';
        playerScreen.style.display = 'block';
        setStatus('Connected', 'connected');
        setTimeout(() => setStatus('', ''), 2000);
        initMediaSource();
      } else {
        showAuthError('Wrong password');
      }
    } catch {
      showAuthError('Connection error');
    }
  }

  function showAuthError(msg) {
    authScreen.style.display = 'block';
    playerScreen.style.display = 'none';
    authError.textContent = msg;
    authError.style.display = 'block';
    passwordInput.focus();
    passwordInput.select();
  }

  function initMediaSource() {
    if (mediaSource) {
      try { video.src = ''; } catch {}
    }

    mediaSource = new MediaSource();
    sourceBuffer = null;
    queue = [];
    initSegment = null;

    dbg('MediaSource created, readyState=' + mediaSource.readyState);
    video.src = URL.createObjectURL(mediaSource);

    mediaSource.addEventListener('sourceopen', () => {
      dbg('MediaSource sourceopen fired');
      if (initSegment && !sourceBuffer) {
        dbg('init segment was queued, creating SourceBuffer now');
        createSourceBuffer(initSegment);
      }
    }, { once: true });

  }

  function handleSegment(data) {
    // JSON text messages (mime type info)
    if (typeof data === 'string') {
      try {
        const msg = JSON.parse(data);
        if (msg.type === 'mime') {
          serverMime = msg.mime;
          dbg('received mime:', msg.mime);
        } else if (msg.type === 'stream_info') {
          streamInfo.fps = msg.fps || null;
          streamInfo.bitrate = msg.bitrate || null;
          if (msg.liveEdgeThreshold) LIVE_EDGE_THRESHOLD = msg.liveEdgeThreshold;
          if (msg.bufferEvictionSeconds) BUFFER_EVICTION_SEC = msg.bufferEvictionSeconds;
          dbg('received stream_info:', JSON.stringify(msg));
        } else if (msg.type === 'viewer_count') {
          streamInfo.viewers = msg.count;
        } else if (msg.type === 'chat' && msg.sender && msg.message) {
          addChatMessage(msg.sender, msg.message);
        } else if (msg.type === 'chat_enabled') {
          handleChatEnabled(msg.enabled);
        } else if (msg.type === 'name_result') {
          handleNameResult(msg);
        }
      } catch {}
      return;
    }

    if (!(data instanceof ArrayBuffer)) return;
    const buf = new Uint8Array(data);

    // First binary message is the init segment (ftyp + moov)
    if (!initSegment) {
      initSegment = buf;
      dbg('received init segment:', buf.length, 'bytes, MediaSource.readyState=' + mediaSource.readyState);
      createSourceBuffer(buf);
      return;
    }

    appendBuffer(buf);
  }

  function createSourceBuffer(init) {
    if (mediaSource.readyState !== 'open') {
      dbg('createSourceBuffer: MediaSource not open yet (readyState=' + mediaSource.readyState + '), deferring');
      return;
    }

    // Use server-provided mime if available, otherwise try common codecs
    let mime = serverMime;
    dbg('createSourceBuffer: serverMime=' + serverMime, 'isSupported=' + (mime ? MediaSource.isTypeSupported(mime) : 'N/A'));
    if (!mime || !MediaSource.isTypeSupported(mime)) {
      const fallbacks = [
        'video/mp4; codecs="avc1.640028,mp4a.40.2"',
        'video/mp4; codecs="avc1.640028"',
        'video/mp4',
      ];
      mime = fallbacks.find(m => MediaSource.isTypeSupported(m)) || 'video/mp4';
      dbg('createSourceBuffer: using fallback mime=' + mime);
    }

    try {
      sourceBuffer = mediaSource.addSourceBuffer(mime);
      sourceBuffer.mode = 'sequence';
      dbg('SourceBuffer created, mode=sequence, mime=' + mime);

      sourceBuffer.addEventListener('updateend', () => {
        if (video.paused) {
          video.play().then(() => {
            dbg('video.play() succeeded');
          }).catch((err) => {
            dbg('video.play() failed:', err.message);
          });
        }
        processQueue();
      });
      sourceBuffer.addEventListener('error', (e) => {
        dbg('SourceBuffer error event', e);
        showError('SourceBuffer error — stream may be corrupted');
      });

      appendBuffer(init);
    } catch (err) {
      dbg('createSourceBuffer failed:', err.message);
      showError('Failed to create SourceBuffer: ' + err.message);
    }
  }

  function appendBuffer(data) {
    if (!sourceBuffer) return;

    queue.push(data);

    // Drop frames if queue is too long (> 10 chunks)
    if (queue.length > 10) {
      const dropped = queue.length - 3;
      queue = queue.slice(-3);
      showError('Dropped ' + dropped + ' frames (queue overflow)', true);
    }

    processQueue();
  }

  function processQueue() {
    if (!sourceBuffer || sourceBuffer.updating || queue.length === 0) return;

    const chunk = queue.shift();
    try {
      sourceBuffer.appendBuffer(chunk);
    } catch (err) {
      if (err.name === 'QuotaExceededError') {
        evictBuffer();
        queue.unshift(chunk);
      } else {
        showError('Buffer append error: ' + err.message);
      }
    }
  }

  function evictBuffer() {
    if (!sourceBuffer || sourceBuffer.updating) return;
    try {
      const buffered = sourceBuffer.buffered;
      if (buffered.length > 0) {
        const removeEnd = buffered.end(buffered.length - 1) - BUFFER_EVICTION_SEC;
        if (removeEnd > buffered.start(0)) {
          sourceBuffer.remove(buffered.start(0), removeEnd);
        }
      }
    } catch {}
  }

  // Live edge seeking — keep video at the live edge
  setInterval(() => {
    if (!video || video.paused || !sourceBuffer) return;

    try {
      const buffered = sourceBuffer.buffered;
      if (buffered.length === 0) return;

      const liveEdge = buffered.end(buffered.length - 1);
      const behind = liveEdge - video.currentTime;

      if (behind > LIVE_EDGE_THRESHOLD) {
        video.currentTime = liveEdge - 0.1;
      }

      // Evict old buffer
      if (liveEdge - buffered.start(0) > BUFFER_EVICTION_SEC) {
        if (!sourceBuffer.updating) {
          sourceBuffer.remove(buffered.start(0), liveEdge - BUFFER_EVICTION_SEC);
        }
      }
    } catch {}
  }, 500);

  // Unmute on click
  video.addEventListener('click', () => {
    video.muted = !video.muted;
    setStatus(video.muted ? 'Muted' : 'Unmuted', 'connected');
    setTimeout(() => setStatus('', ''), 1500);
  });

  function scheduleReconnect() {
    const delay = RECONNECT_DELAYS[Math.min(reconnectAttempt, RECONNECT_DELAYS.length - 1)];
    reconnectAttempt++;
    setTimeout(() => connect(), delay);
  }
})();
</script>
</body>
</html>
