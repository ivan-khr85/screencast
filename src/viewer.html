<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screen Stream</title>
<link rel="stylesheet" href="/viewer.css">
</head>
<body>

<div id="auth-screen">
  <h1>Screen Stream</h1>
  <form id="auth-form">
    <input type="text" id="password-input" placeholder="Enter password" autocomplete="off" autofocus>
    <button type="submit">Connect</button>
    <div id="auth-error"></div>
  </form>
</div>

<div id="player-screen">
  <video id="video" autoplay muted playsinline></video>
</div>

<div id="status"></div>
<div id="stream-stats"></div>
<div id="error-toasts"></div>

<button id="mute-toggle" onclick="toggleMute()">
  <svg id="icon-muted" viewBox="0 0 24 24"><path d="M3.63 3.63a.75.75 0 0 1 1.06 0l15.68 15.68a.75.75 0 1 1-1.06 1.06L3.63 4.69a.75.75 0 0 1 0-1.06ZM11 7.2V4a1 1 0 0 0-1.65-.76L6.26 5.91 11 10.65V7.2ZM5 9a1 1 0 0 0-1 1v4a1 1 0 0 0 1 1h2.46l3.89 2.76A1 1 0 0 0 13 17v-3.35l-2-2V15l-3.35-2.37a1 1 0 0 0-.58-.18H6v-3.9L4.2 6.75A3 3 0 0 0 4 8v0 1h1Z"/><path d="M16.5 12a4.5 4.5 0 0 0-2.09-3.8l-1.42 1.42A2.5 2.5 0 0 1 14.5 12c0 .52-.16 1-.43 1.4l1.08 1.08A4.48 4.48 0 0 0 16.5 12ZM19 12c0-2.35-1.08-4.45-2.77-5.83l-1.07 1.07A6.01 6.01 0 0 1 17 12c0 1.84-.83 3.49-2.13 4.6l1.06 1.06A8.01 8.01 0 0 0 19 12Z"/></svg>
  <svg id="icon-unmuted" style="display:none" viewBox="0 0 24 24"><path d="M11.35 3.24A1 1 0 0 1 12 4v16a1 1 0 0 1-1.65.76L6.46 18H4a2 2 0 0 1-2-2v-4a2 2 0 0 1 2-2h2.46l3.89-2.76a1 1 0 0 1 1-.24ZM10 7.2 7.07 9.27a1 1 0 0 1-.58.18H4v5.1h2.49a1 1 0 0 1 .58.18L10 16.8V7.2Z"/><path d="M15.5 12a2.5 2.5 0 0 0-1.4-2.25.75.75 0 1 1 .7-1.33A4 4 0 0 1 17 12a4 4 0 0 1-2.2 3.58.75.75 0 0 1-.7-1.33A2.5 2.5 0 0 0 15.5 12ZM17.7 6.17a.75.75 0 1 0-.88 1.22A6.01 6.01 0 0 1 19.5 12a6.01 6.01 0 0 1-2.68 4.61.75.75 0 1 0 .88 1.22A7.51 7.51 0 0 0 21 12a7.51 7.51 0 0 0-3.3-5.83Z"/></svg>
</button>
<button id="chat-toggle" onclick="toggleChat()">
  <span>&#128172;</span>
  <span class="badge" id="chat-badge"></span>
</button>
<div id="chat-panel">
  <div id="chat-resize-handle"></div>
  <div id="chat-name-row">
    <input type="text" id="chat-name-input" placeholder="Enter your name..." maxlength="30" autocomplete="off">
    <button id="chat-name-btn" onclick="setName()">Join</button>
  </div>
  <div id="chat-name-error"></div>
  <div id="chat-messages"></div>
  <div id="chat-input-row" style="display:none;">
    <input type="text" id="chat-input" placeholder="Send a message..." maxlength="500" autocomplete="off">
    <button id="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<script src="/viewer.js"></script>
</body>
</html>
