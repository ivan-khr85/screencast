<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screen Stream</title>
<link rel="stylesheet" href="/viewer.css">
</head>
<body>

<div id="auth-screen">
  <h1>Screen Stream</h1>
  <form id="auth-form">
    <input type="text" id="password-input" placeholder="Enter password" autocomplete="off" autofocus>
    <button type="submit">Connect</button>
    <div id="auth-error"></div>
  </form>
</div>

<div id="player-screen">
  <video id="video" autoplay muted playsinline></video>
</div>

<div id="status"></div>
<div id="stream-stats"></div>
<div id="error-toasts"></div>

<button id="mute-toggle" onclick="toggleMute()">
  <svg id="icon-muted" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><line x1="23" y1="9" x2="17" y2="15"/><line x1="17" y1="9" x2="23" y2="15"/></svg>
  <svg id="icon-unmuted" style="display:none" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="11 5 6 9 2 9 2 15 6 15 11 19 11 5"/><path d="M19.07 4.93a10 10 0 0 1 0 14.14"/><path d="M15.54 8.46a5 5 0 0 1 0 7.07"/></svg>
</button>
<button id="chat-toggle" onclick="toggleChat()">
  <span>&#128172;</span>
  <span class="badge" id="chat-badge"></span>
</button>
<div id="chat-panel">
  <div id="chat-resize-handle"></div>
  <div id="chat-name-row">
    <input type="text" id="chat-name-input" placeholder="Enter your name..." maxlength="30" autocomplete="off">
    <button id="chat-name-btn" onclick="setName()">Join</button>
  </div>
  <div id="chat-name-error"></div>
  <div id="chat-messages"></div>
  <div id="chat-input-row" style="display:none;">
    <input type="text" id="chat-input" placeholder="Send a message..." maxlength="500" autocomplete="off">
    <button id="chat-send" onclick="sendChat()">Send</button>
  </div>
</div>

<script src="/viewer.js"></script>
</body>
</html>
