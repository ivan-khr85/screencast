<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Screencast</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<div class="titlebar">Screencast</div>

<div class="container">

  <!-- Settings -->
  <div id="settings">
    <div class="section">
      <div class="section-title">Settings</div>
      <div class="field">
        <label>Port</label>
        <input type="number" id="port" value="8080" min="1024" max="65535">
      </div>
      <div class="field">
        <label>FPS</label>
        <input type="number" id="fps" value="30" min="1" max="60">
      </div>
      <div class="field">
        <label>Bitrate</label>
        <input type="text" id="bitrate" value="19500k">
      </div>
      <div class="field">
        <label>Quality</label>
        <select id="quality">
          <option value="720">720p</option>
          <option value="1080">1080p</option>
          <option value="original" selected>Original</option>
        </select>
      </div>
      <div class="field">
        <label>Latency</label>
        <select id="latency">
          <option value="ultra-low" selected>Ultra-Low</option>
          <option value="medium">Medium</option>
          <option value="slow">Slow (Stable)</option>
        </select>
      </div>
      <div class="field">
        <label>Password</label>
        <input type="text" id="password" placeholder="auto">
      </div>
      <div class="field">
        <label>Max Viewers</label>
        <input type="number" id="maxViewers" value="5" min="1" max="50">
      </div>
      <div class="field">
        <label>Audio</label>
        <select id="audioMode">
          <option value="system" selected>System Audio</option>
          <option value="app">App Audio</option>
          <option value="none">No Audio</option>
        </select>
      </div>
      <div class="field hidden" id="audioAppField">
        <label>App</label>
        <select id="audioApp">
          <option value="">Select app...</option>
        </select>
      </div>
      <div class="field">
        <label>Public Tunnel</label>
        <label class="toggle">
          <input type="checkbox" id="tunnel" checked>
          <span class="slider"></span>
        </label>
      </div>
      <div class="field">
        <label>Chat</label>
        <label class="toggle">
          <input type="checkbox" id="chat" checked>
          <span class="slider"></span>
        </label>
      </div>
    </div>
  </div>

  <!-- Control Button -->
  <button id="startBtn" class="btn btn-start" onclick="toggleStream()">
    Start Stream
  </button>

  <div id="error" class="error hidden"></div>

  <!-- Stream Info (shown when streaming) -->
  <div id="stream-info" class="hidden">
    <div class="section" style="margin-top: 14px;">
      <div class="section-title">Stream Info</div>
      <div class="info-row">
        <span class="info-label">URL</span>
        <span id="stream-url" class="info-value"></span>
        <button class="btn-copy" onclick="copyField('url', this)">Copy</button>
      </div>
      <div class="info-row">
        <span class="info-label">Password</span>
        <span id="stream-password" class="info-value"></span>
        <button class="btn-copy" onclick="copyField('password', this)">Copy</button>
      </div>
      <div class="info-row" style="margin-top: 12px; justify-content: center;">
        <button class="btn-copy" style="padding: 6px 16px; font-size: 12px; color: #4a9eff; border-color: #4a9eff44;" onclick="copyField('link', this)">Copy Link (auto-connect)</button>
      </div>
    </div>

    <div class="section">
      <div class="viewers-display">
        <div id="viewer-count" class="viewers-count">0 / 5</div>
        <div class="viewers-label">Viewers</div>
      </div>
      <div class="field" style="margin-top: 10px;">
        <label>Chat</label>
        <label class="toggle">
          <input type="checkbox" id="chat-live-toggle" checked onchange="window.toggleLiveChat(this.checked)">
          <span class="slider"></span>
        </label>
      </div>
    </div>

    <div id="audio-note" class="audio-note hidden">
      Audio capture unavailable
    </div>
  </div>

</div>

<script src="app.js"></script>
</body>
</html>
